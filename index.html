<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <!-- Vinculamos los estilos CSS -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Hardware Express 🇻🇪</h1>
            <div class="carrito-icono">
                🛒 Carrito (<span id="contador-carrito">0</span>)
            </div>
        </div>
    </header>

    <main>
        <h2>Catálogo de Productos</h2>
        <!-- Aquí es donde JavaScript pintará las tarjetas de los productos -->
        <section id="contenedor-productos" class="productos-grid"></section>
    </main>

    <footer>
        <p>&copy; 2026 Hardware Express. Alojado gratis en GitHub Pages.</p>
    </footer>

    <!-- Vinculamos los scripts de JavaScript (¡El orden importa!) -->
    <script src="./productos.js"></script>
<script src="./app.js"></script>
</body>
    <div id="modalCRM" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; font-family: sans-serif;">
    <div style="background:#1a1a1a; padding:25px; border-radius:12px; width:90%; max-width:380px; color:white; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h3 style="margin-top:0; color:#00d1b2;">Finalizar Pedido</h3>
        <p style="font-size:14px; color:#ccc;">Ingresa tus datos para registrar la orden en nuestro sistema:</p>
        
        <label style="font-size:12px; color:#888;">Nombre Completo</label>
        <input type="text" id="nombreCliente" placeholder="Ej. Royner Chirino" style="width:100%; padding:10px; margin: 5px 0 15px 0; border-radius:6px; border:1px solid #444; background:#222; color:white; box-sizing: border-box;">
        
        <label style="font-size:12px; color:#888;">WhatsApp / Teléfono</label>
        <input type="text" id="telCliente" placeholder="Ej. 04121234567" style="width:100%; padding:10px; margin: 5px 0 20px 0; border-radius:6px; border:1px solid #444; background:#222; color:white; box-sizing: border-box;">
        
        <button id="btnConfirmarCRM" style="width:100%; padding:12px; background:#00d1b2; color:black; border:none; border-radius:6px; cursor:pointer; font-weight:bold; transition: 0.3s;">CONFIRMAR COMPRA</button>
        <button onclick="document.getElementById('modalCRM').style.display='none'" style="width:100%; margin-top:10px; background:none; color:#ff4444; border:none; cursor:pointer; font-size:13px;">Cancelar</button>
    </div>
</div>
</html><div class="carrito-icono" onclick="window.location.href='carrito.html'" style="cursor:pointer;">
    🛒 Carrito (<span id="contador-carrito">0</span>)
</div>
<!-- 1. Cargamos las herramientas de Firebase (Líneas nuevas) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- 2. Tu script general que ya tenías (¡Asegúrate de que quede abajo de Firebase!) -->
    <script src="app.js"></script> 
</body>
</html>
