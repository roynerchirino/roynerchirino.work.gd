<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <!-- Vinculamos los estilos CSS -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header>
        <div class="header-container" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #1a1a1a;">
            <h1>Hardware Express 🇻🇪</h1>
            
            <div style="display: flex; align-items: center; gap: 15px;">
                <!-- Botón de inicio de sesión con Google -->
                <button id="btn-google" type="button" style="padding: 8px 15px; background-color: #ffffff; color: #1a1a1a; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 16px; height: 16px;">
                    Continuar con Google
                </button>

                <!-- Perfil del usuario una vez logueado -->
                <div id="perfil-usuario" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-email" style="color: white; font-weight: bold;"></span>
                    <button id="btn-logout" class="btn-salir" style="background-color: #ff4a5a; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">
                        Salir
                    </button>
                </div>

                <!-- Botón de carrito de compras -->
                <div class="carrito-icono" onclick="window.location.href='carrito.html'" style="cursor:pointer; color: white;">
                    🛒 Carrito (<span id="contador-carrito">0</span>)
                </div>
            </div>
        </div>
    </header>

    <main>
        <h2>Catálogo de Productos</h2>
        <!-- Aquí es donde JavaScript pintará las tarjetas de los productos -->
        <section id="contenedor-productos" class="productos-grid"></section>
    </main>

    <!-- Estructura del Modal CRM (Formulario de Checkout) -->
    <div id="modalCRM" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; font-family: sans-serif;">
        <div id="modal-checkout-body" style="background:#1a1a1a; padding:25px; border-radius:12px; width:90%; max-width:380px; color:white; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h3 style="margin-top:0; color:#00d1b2;">Finalizar Pedido</h3>
            <p style="font-size:14px; color:#ccc;">Ingresa tus datos y adjunta tu comprobante para registrar la orden:</p>
            
            <form id="checkout-form" onsubmit="return false;">
                <label style="font-size:12px; color:#888;">Nombre Completo</label>
                <input type="text" id="nombreCliente" placeholder="Ej. Royner Chirino" style="width:100%; padding:10px; margin: 5px 0 15px 0; border-radius:6px; border:1px solid #444; background:#222; color:white; box-sizing: border-box;" required>
                
                <label style="font-size:12px; color:#888;">WhatsApp / Teléfono</label>
                <input type="text" id="telCliente" placeholder="Ej. 04121234567" style="width:100%; padding:10px; margin: 5px 0 15px 0; border-radius:6px; border:1px solid #444; background:#222; color:white; box-sizing: border-box;" required>
                
                <label style="font-size:12px; color:#888;">Adjuntar Captura de Pago Móvil</label>
                <input type="file" id="pago-comprobante" accept="image/*" style="width:100%; padding:10px; margin: 5px 0 20px 0; border-radius:6px; border:1px solid #444; background:#222; color:white; box-sizing: border-box;" required>

                <button id="btnConfirmarCRM" style="width:100%; padding:12px; background:#00d1b2; color:black; border:none; border-radius:6px; cursor:pointer; font-weight:bold; transition: 0.3s;">CONFIRMAR COMPRA</button>
            </form>
            <button onclick="document.getElementById('modalCRM').style.display='none'" style="width:100%; margin-top:10px; background:none; color:#ff4444; border:none; cursor:pointer; font-size:13px;">Cancelar</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hardware Express. Alojado gratis en GitHub Pages.</p>
    </footer>

    <!-- Scripts de Firebase y de la Tienda -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="productos.js"></script>
    <script src="app.js"></script>

    <!-- Script de Chat de Tawk.to -->
    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;
            s1.src='https://embed.tawk.to/6a1a4fcdedf0db1c340601c4/1jprcfeqj';
            s1.charset='UTF-8';
            s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
