<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <!-- Vinculamos los estilos CSS -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Hardware Express 🇻🇪</h1>
            <div class="carrito-icono">
                🛒 Carrito (<span id="contador-carrito">0</span>)
            </div>
        </div>
    </header>

    <main>
        <h2>Catálogo de Productos</h2>
        <!-- Aquí es donde JavaScript pintará las tarjetas de los productos -->
        <section id="contenedor-productos" class="productos-grid"></section>
    </main>

    <footer>
        <p>&copy; 2026 Hardware Express. Alojado gratis en GitHub Pages.</p>
    </footer>

    <!-- Vinculamos los scripts de JavaScript (¡El orden importa!) -->
    <script src="./productos.js"></script>
<script src="./app.js"></script>
</body>
</html><div class="carrito-icono" onclick="window.location.href='carrito.html'" style="cursor:pointer;">
    🛒 Carrito (<span id="contador-carrito">0</span>)
</div>
<div id="modalCRM" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#222; padding:20px; border-radius:10px; width:90%; max-width:400px; color:white; border: 1px solid #444;">
        <h3>Finalizar Pedido</h3>
        <p>Déjanos tus datos para procesar la compra:</p>
        <input type="text" id="nombreCliente" placeholder="Nombre completo" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <input type="text" id="telCliente" placeholder="WhatsApp (ej: 0412...)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <button id="btnConfirmarCRM" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Confirmar y Enviar</button>
        <button onclick="document.getElementById('modalCRM').style.display='none'" style="width:100%; margin-top:10px; background:none; color:#aaa; border:none; cursor:pointer;">Cancelar</button>
    </div>
</div>
