        </div>

      <h2>Resumen de tu Pedido</h2>

<div id="resumen-productos" style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee;">
    <div id="lista-carrito">
        </div>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <p id="mensaje-estado" style="display:none; text-align:center; margin-top:10px; color:#00d1b2; font-size:12px;">Procesando envío... ⏳</p>
