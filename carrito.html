<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Hardware Express</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1 onclick="window.location.href='index.html'" style="cursor:pointer;">Hardware Express 🇻🇪</h1>
            <div class="carrito-icono" onclick="window.location.href='index.html'">
                Volver al Catálogo 📦
            </div>
        </div>
    </header>

    <main>
        <h2>Resumen de tu Pedido</h2>
        
        <!-- Aquí se listarán los productos agregados -->
       <div id="seccion-pago" style="background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; color: white;">
    <h3 style="color: #00d1b2; margin-top: 0;">Confirmar Pago Móvil</h3>
    <p style="font-size: 13px; color: #ccc;">Sube la foto del comprobante para procesar tu orden:</p>
    
    <input type="file" id="archivo-pago" accept="image/*" style="width: 100%; margin: 15px 0; color: #888;">
    
    <button id="btn-finalizar-todo" style="width:100%; padding:14px; background:#00d1b2; color:black; border:none; font-weight:bold; border-radius:8px; cursor:pointer;">
        FINALIZAR COMPRA ✅
    </button>
    <p id="mensaje-estado" style="display:none; text-align:center; margin-top:10px; color:#00d1b2; font-size:12px;">Procesando envío... ⏳</p>
</div>
    </main>

    <footer>
        <p>&copy; 2026 Hardware Express. Alojado gratis en GitHub Pages.</p>
    </footer>

    <!-- Cargamos los mismos scripts para mantener la lógica conectada -->
    <script src="./productos.js"></script>
<script src="./productos.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="./app.js"></script>
    
    <script>
        // Esto ahora funcionará porque app.js ya estará cargado
        renderizarListaCarrito();
    </script>
</body>
</html>
