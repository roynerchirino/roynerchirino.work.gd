        <h2 style="color:#00d1b2;">Hardware Express</h2>
        <input type="email" id="loginEmail" placeholder="Correo" style="width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none;">
        <input type="password" id="loginPass" placeholder="Contraseña" style="width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none;">
        <button id="btnLogin" style="width:100%; padding:10px; background:#00d1b2; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:6px;">ENTRAR</button>
    </div>
