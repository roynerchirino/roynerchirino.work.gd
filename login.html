<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hardware Express VE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { max-width: 400px; width: 90%; background: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; border: 1px solid #334155; }
        .login-box h2 { color: #00d1b2; margin-bottom: 1rem; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #00d1b2; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 15px; font-size: 1rem; }
        .btn-login:hover { background: #00b89c; }
        .footer-text { margin-top: 20px; color: #94a3b8; font-size: 0.9rem; }
        .footer-text a { color: #00d1b2; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Hardware Express</h2>
        <p style="color: #94a3b8;">Inicia sesión con tu cuenta</p>
        
        <input type="email" id="loginEmail" placeholder="Correo electrónico">
        <input type="password" id="loginPass" placeholder="Contraseña">
        
        <button class="btn-login" id="btnLogin">ENTRAR</button>
        
        <div class="footer-text">
            ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBE0Sg4lTMfczh1nWnhp7YD1JePH6usOHA",
          authDomain: "hardware-express-ve.firebaseapp.com",
          projectId: "hardware-express-ve",
          storageBucket: "hardware-express-ve.firebasestorage.app",
          messagingSenderId: "551081609311",
          appId: "1:551081609311:web:6eed5549a701db6fe033ea",
          measurementId: "G-Z81Z0YC2CC"
        };
        
        // Inicializar Firebase una sola vez
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>

    <script src="app.js"></script>

</body>
</html>
