<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hardware Express VE</title>
    <link rel="stylesheet" href="style.css"> <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #00d1b2;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
        }
        .btn-google {
            background: white;
            color: #444;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #00d1b2;">Hardware Express</h2>
        <p>Inicia sesión para gestionar tus compras</p>
        
        <input type="email" id="loginEmail" placeholder="Tu correo electrónico">
        <input type="password" id="loginPass" placeholder="Tu contraseña">
        
        <button class="btn-login" id="btnLogin">ENTRAR</button>
        <button class="btn-login btn-google" id="btnGoogle">Continuar con Google</button>
        
        <p style="margin-top: 20px;">¿No tienes cuenta? <a href="#" style="color: #00d1b2;">Regístrate aquí</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
