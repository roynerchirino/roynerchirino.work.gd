<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hardware Express VE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #00d1b2;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 15px;
        }
        .btn-google { background: white; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: #00d1b2;">Hardware Express</h2>
        <p style="color: #888;">Inicia sesión para continuar</p>
        
        <input type="email" id="loginEmail" placeholder="Correo electrónico">
        <input type="password" id="loginPass" placeholder="Contraseña">
        
        <button class="btn-login" id="btnLogin">ENTRAR</button>
        <button class="btn-login btn-google" id="btnGoogle">Continuar con Google</button>
        
        <p style="margin-top: 25px; color: #aaa;">¿No tienes cuenta? <a href="#" style="color: #00d1b2; text-decoration: none;">Regístrate</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBE0Sg4lTMfczh1nWnhp7YD1JePH6usOHA",
          authDomain: "hardware-express-ve.firebaseapp.com",
          projectId: "hardware-express-ve",
          storageBucket: "hardware-express-ve.firebasestorage.app",
          messagingSenderId: "551081609311",
          appId: "1:551081609311:web:5e17e7b2ed5af122e033ea",
          measurementId: "G-465FG63MF4"
        };
        // Inicializar antes de que app.js lo use
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>

    <script src="app.js"></script>

</body>
</html>
</html>
